<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="card-title mb-0">새 상품 등록</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/products/create}" th:object="${product}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">상품명</label>
                            <input type="text" th:field="*{name}" class="form-control" id="name" required>
                        </div>

                        <div class="mb-3">
                            <label for="category" class="form-label">카테고리 선택</label>
                            <select th:field="*{category.id}" class="form-select" id="category" required>
                                <option value="">-- 카테고리를 선택하세요 --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}">카테고리</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label">가격</label>
                            <input type="number" th:field="*{price}" class="form-control" id="price" required>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">등록하기</button>
                            <a th:href="@{/products}" class="btn btn-secondary">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
