<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Category List</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
  <h2>카테고리 목록</h2>

  <div th:if="${errorMessage}" class="alert alert-danger mt-3" th:text="${errorMessage}"></div>
  <div th:if="${successMessage}" class="alert alert-success mt-3" th:text="${successMessage}"></div>

  <div class="text-end mb-3">
    <a th:href="@{/categories/create}" class="btn btn-primary">새 카테고리 등록</a>
    <a th:href="@{/products}" class="btn btn-secondary">상품 목록으로</a>
  </div>

  <table class="table table-bordered table-striped text-center">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>카테고리명</th>
      <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="category : ${categories}">
      <td th:text="${category.id}"></td>
      <td th:text="${category.name}"></td>
      <td>
        <form th:action="@{/categories/{id}/delete(id=${category.id})}" method="post"
              onsubmit="return confirm('정말 삭제하시겠습니까?');">
          <button type="submit" class="btn btn-danger btn-sm">삭제</button>
        </form>
      </td>
    </tr>
    <tr th:if="${#lists.isEmpty(categories)}">
      <td colspan="3">등록된 카테고리가 없습니다.</td>
    </tr>
    </tbody>
  </table>
</div>

<footer class="mt-5 py-3 bg-light text-center border-top">
  <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371363 | 성명: 동혜린'}"></p>
</footer>
</body>
</html>
