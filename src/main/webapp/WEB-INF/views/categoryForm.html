<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Category</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="card-title mb-0">새 카테고리 등록</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">카테고리 이름</label>
                            <input type="text" th:field="*{name}" class="form-control" id="name"
                                   placeholder="예: 가전제품, 의류" required>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">등록하기</button>
                            <a th:href="@{/categories}" class="btn btn-secondary">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
