<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>상품 목록</h2>
    <div class="text-end mb-3">
        <a th:href="@{/products/create}" class="btn btn-primary">새 상품 등록</a>
        <a th:href="@{/categories}" class="btn btn-success">카테고리 관리</a>
    </div>

    <table class="table table-bordered table-striped text-center">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>상품명</th>
            <th>카테고리</th>
            <th>가격</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}">1</td>
            <td th:text="${product.name}">상품명</td>
            <td th:text="${product.category != null ? product.category.name : '미지정'}">카테고리</td>
            <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">0원</td>
            <td>
                <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                    <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="5">등록된 상품이 없습니다.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
