<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>상품 목록</h2>
    <div class="card mb-3 shadow-sm"><div class="card-body">
        <form th:action="@{/products}" method="get" class="row g-3">
            <div class="col-auto"><input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="상품명 검색"/></div>
            <div class="col-auto"><select name="categoryId" class="form-select">
                <option value="">-- 전체 카테고리 --</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == categoryId}"></option>
            </select></div>
            <div class="col-auto"><button type="submit" class="btn btn-dark">검색</button></div>
        </form>
    </div></div>
    <table class="table table-bordered table-striped text-center">
        <thead class="table-dark"><tr><th>ID</th><th>상품명</th><th>카테고리</th><th>가격</th><th>관리</th></tr></thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.category != null ? product.category.name : '미지정'}"></td>
            <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"></td>
            <td><form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"><button type="submit" class="btn btn-danger btn-sm">삭제</button></form></td>
        </tr>
        <tr th:if="${#lists.isEmpty(products)}"><td colspan="5">검색 결과가 없습니다.</td></tr>
        </tbody>
    </table>
    <div class="text-end"><a th:href="@{/products/create}" class="btn btn-primary">등록</a> <a th:href="@{/categories}" class="btn btn-success">카테고리 관리</a></div>
</div>

<footer class="mt-5 py-3 bg-light text-center border-top">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2371363 | 성명: 동혜린'}"></p>
</footer>
</body>
</html>
